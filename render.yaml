databases:
  - name: gym-planner-db
    databaseName: gym_planner
    user: gym_planner_user
    plan: free

services:
  - type: web
    name: gym-diet-planner-backend
    env: python
    buildCommand: "./backend/build.sh"
    startCommand: "gunicorn gym_diet_planner.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-planner-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: USE_SQLITE
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: FRONTEND_URL
        value: "https://your-vercel-app-url.vercel.app" # UPDATE THIS AFTER DEPLOYING FRONTEND
    rootDir: "backend"
